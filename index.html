<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Firmar Documento - PRUEBAFIRMA_1</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 600px;
    }

    .header h1 {
      font-size: 1.4rem;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .header .doc-name {
      font-size: 0.9rem;
      color: #666;
      background: #e8e8e8;
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .status-bar {
      width: 100%;
      max-width: 600px;
      padding: 10px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .status-bar.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .status-bar.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .status-bar.loading {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      display: block;
    }

    /* Visor del PDF */
    .pdf-viewer {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .pdf-viewer-header {
      background: #2c3e50;
      color: white;
      padding: 10px 16px;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pdf-frame {
      width: 100%;
      height: 400px;
      border: none;
    }

    @media (max-width: 480px) {
      .pdf-frame { height: 300px; }
    }

    /* Sección de firma */
    .signature-section {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      margin-bottom: 20px;
    }

    .signature-section-header {
      background: #27ae60;
      color: white;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .signature-instructions {
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #555;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }

    .signature-container {
      padding: 16px;
    }

    .signature-pad-wrapper {
      border: 2px dashed #ccc;
      border-radius: 8px;
      position: relative;
      background: #fefefe;
      overflow: hidden;
    }

    .signature-pad-wrapper::after {
      content: "Firma aquí";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ddd;
      font-size: 1.2rem;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .signature-pad-wrapper.has-signature::after {
      opacity: 0;
    }

    canvas#signature-pad {
      width: 100%;
      height: 180px;
      display: block;
      touch-action: none;
      cursor: crosshair;
    }

    .signature-line {
      position: absolute;
      bottom: 30px;
      left: 20px;
      right: 20px;
      border-bottom: 1px solid #ddd;
      pointer-events: none;
    }

    .signature-label {
      position: absolute;
      bottom: 8px;
      left: 20px;
      font-size: 0.7rem;
      color: #bbb;
      pointer-events: none;
    }

    /* Datos del firmante */
    .signer-info {
      padding: 0 16px 16px;
    }

    .signer-info label {
      display: block;
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 4px;
      margin-top: 10px;
    }

    .signer-info input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: border-color 0.2s;
    }

    .signer-info input:focus {
      outline: none;
      border-color: #27ae60;
    }

    /* Botones */
    .actions {
      padding: 0 16px 16px;
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear {
      background: #ecf0f1;
      color: #666;
    }

    .btn-clear:hover { background: #dfe6e9; }

    .btn-sign {
      background: #27ae60;
      color: white;
    }

    .btn-sign:hover { background: #219a52; }
    .btn-sign:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    .btn-sign.loading {
      background: #7f8c8d;
      position: relative;
    }

    /* Footer */
    .footer {
      margin-top: auto;
      padding-top: 20px;
      text-align: center;
      font-size: 0.75rem;
      color: #999;
    }
  </style>
</head>
<body>

  <!-- Encabezado -->
  <div class="header">
    <h1>📝 Firma de Documento</h1>
    <span class="doc-name">📄 PRUEBAFIRMA_1.pdf</span>
  </div>

  <!-- Barra de estado -->
  <div id="statusBar" class="status-bar"></div>

  <!-- Visor del PDF -->
  <div class="pdf-viewer">
    <div class="pdf-viewer-header">
      <span>📄 Documento</span>
      <span>PRUEBAFIRMA_1.pdf</span>
    </div>
    <!-- 
      REEMPLAZA EL ID DEL ARCHIVO CON EL DE TU GOOGLE DRIVE
      El formato del enlace es:
      https://drive.google.com/file/d/TU_ID_AQUI/preview
    -->
    <iframe 
      class="pdf-frame" 
	src="https://docs.google.com/viewer?srcid=1seJaAmGA8DUGr6UD1X5OkvXpVcvO0Zyf&pid=explorer&efb=false&a=v&chrome=false&embedded=true"
    </iframe>
  </div>

  <!-- Sección de firma -->
  <div class="signature-section">
    <div class="signature-section-header">
      ✍️ Firma electrónica
    </div>

    <div class="signature-instructions">
      Usa tu dedo para dibujar tu firma en el recuadro de abajo. Puedes borrar y volver a firmar cuantas veces necesites.
    </div>

    <div class="signature-container">
      <div class="signature-pad-wrapper" id="padWrapper">
        <canvas id="signature-pad"></canvas>
        <div class="signature-line"></div>
        <div class="signature-label">Firma</div>
      </div>
    </div>

    <!-- Datos del firmante -->
    <div class="signer-info">
      <label for="signerName">Nombre completo *</label>
      <input type="text" id="signerName" placeholder="Ej: María García López" required>

      <label for="signerEmail">Correo electrónico *</label>
      <input type="email" id="signerEmail" placeholder="Ej: maria@correo.com" required>
    </div>

    <!-- Botones -->
    <div class="actions">
      <button class="btn btn-clear" onclick="clearSignature()">🗑️ Borrar</button>
      <button class="btn btn-sign" id="btnSign" onclick="submitSignature()">✅ Firmar Documento</button>
    </div>
  </div>

  <div class="footer">
    Documento protegido · Firma electrónica simple<br>
    Fecha y hora del servidor se registran al firmar
  </div>

  <!-- Signature Pad -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

  <script>
    // ==========================================
    // CONFIGURACIÓN - CAMBIA ESTOS VALORES
    // ==========================================

// Tu webhook de pruebas real combinado con tu ngrok actual
const WEBHOOK_URL = 'https://unengaged-coil-lens.ngrok-free.dev/webhook-test/899941cd-919e-4ad4-8512-bd46418d06bd';
// ID del documento (para identificar qué PDF firmar)
const DOCUMENTO_ID = 'PRUEBAFIRMA_1';

    // ==========================================
    // INICIALIZAR SIGNATURE PAD
    // ==========================================

    const canvas = document.getElementById('signature-pad');
    const padWrapper = document.getElementById('padWrapper');

    const signaturePad = new SignaturePad(canvas, {
      minWidth: 0.8,
      maxWidth: 2.5,
      penColor: '#1a1a1a',
      backgroundColor: 'rgba(255,255,255,0)',
      velocityEffectWidth: true
    });

    // Detectar cuando hay firma para ocultar el placeholder
    signaturePad.addEventListener('beginStroke', () => {
      padWrapper.classList.add('has-signature');
    });

    // Ajustar canvas a pantalla (evita firma borrosa)
    function resizeCanvas() {
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      signaturePad.clear();
      padWrapper.classList.remove('has-signature');
    }

    window.addEventListener('resize', resizeCanvas);
    // Pequeño delay para que el canvas tenga su tamaño final
    setTimeout(resizeCanvas, 100);

    // ==========================================
    // FUNCIONES
    // ==========================================

    function clearSignature() {
      signaturePad.clear();
      padWrapper.classList.remove('has-signature');
    }

    function showStatus(message, type) {
      const bar = document.getElementById('statusBar');
      bar.textContent = message;
      bar.className = 'status-bar ' + type;
    }

    function hideStatus() {
      const bar = document.getElementById('statusBar');
      bar.className = 'status-bar';
    }

    async function submitSignature() {
      // Validar firma
      if (signaturePad.isEmpty()) {
        showStatus('⚠️ Por favor dibuja tu firma antes de confirmar', 'error');
        return;
      }

      // Validar nombre
      const nombre = document.getElementById('signerName').value.trim();
      if (!nombre) {
        showStatus('⚠️ Ingresa tu nombre completo', 'error');
        document.getElementById('signerName').focus();
        return;
      }

      // Validar email
      const email = document.getElementById('signerEmail').value.trim();
      if (!email || !email.includes('@')) {
        showStatus('⚠️ Ingresa un correo electrónico válido', 'error');
        document.getElementById('signerEmail').focus();
        return;
      }

      // Deshabilitar botón mientras se envía
      const btn = document.getElementById('btnSign');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = '⏳ Enviando...';

      showStatus('📤 Procesando firma...', 'loading');

  try {
        // Capturar firma como PNG (base64)
        const firmaPNG = signaturePad.toDataURL('image/png');

        // Preparar datos para enviar
        const payload = {
          documento_id: DOCUMENTO_ID,
          firmante_nombre: nombre,
          firmante_email: email,
          firma_imagen: firmaPNG,
          fecha_hora: new Date().toISOString(),
          metadata: {
            navegador: navigator.userAgent.substring(0, 80),
            pantalla: `${screen.width}x${screen.height}`,
            tipo: 'firma_electronica_simple'
          }
        };

        // ========================================================
        // AQUÍ VA EL NUEVO BLOQUE (REEMPLAZANDO AL ANTERIOR FETCH)
        // ========================================================
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': 'true' // Evita que ngrok bloquee la petición en el cel
          },
          body: JSON.stringify(payload)
        });
        // ========================================================

        if (response.ok) {
          showStatus('✅ ¡Documento firmado correctamente! Se ha enviado confirmación a tu correo.', 'success');
          
          // Bloquear interfaz para evitar doble firma
          signaturePad.off();
          canvas.style.opacity = '0.5';
          document.getElementById('signerName').disabled = true;
          document.getElementById('signerEmail').disabled = true;
          btn.textContent = '✅ Firmado';
        } else {
          throw new Error(`Error ${response.status}`);
        }

      } catch (error) {
        console.error('Error al enviar firma:', error);
        showStatus('❌ Error al enviar la firma. Verifica tu conexión e intenta de nuevo.', 'error');
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = '✅ Firmar Documento';
      }
    }
  </script>

</body>
</html>
